# ─────────────────────────────────────────────────────────────────
# NavaiaForge — distribution stack (closed-source backend image).
#
# This compose file pulls a pre-built, Cython-compiled image from
# GHCR. Customers do NOT need source access — set NAVAIA_LICENSE in
# .env and run `docker compose -f docker-compose.dist.yml up -d`.
#
# Use the matching frontend image (also published to GHCR) or omit
# the UI service if you only need the API.
# ─────────────────────────────────────────────────────────────────

services:
  navaia-forge-api:
    image: ghcr.io/navaiasolutions/navaia-forge-backend:${NAVAIA_BACKEND_VERSION:-latest}
    container_name: navaia-forge-api
    pull_policy: always
    ports:
      - "${API_PORT:-8001}:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-navaia_forge}:${POSTGRES_PASSWORD:-navaia_forge}@postgres:5432/${POSTGRES_DB:-navaia_forge}
      REDIS_URL: redis://redis:6379/0
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-}
      # ── License — required to start ────────────────────────
      NAVAIA_LICENSE: ${NAVAIA_LICENSE:?Set NAVAIA_LICENSE in .env to a token issued by Navaia}
      NAVAIA_LICENSE_ENFORCEMENT: ${NAVAIA_LICENSE_ENFORCEMENT:-strict}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - navaia-forge

  navaia-forge-ui:
    image: ghcr.io/navaiasolutions/navaia-forge-frontend:${NAVAIA_FRONTEND_VERSION:-latest}
    container_name: navaia-forge-ui
    pull_policy: always
    ports:
      - "${UI_PORT:-3030}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8001}
    depends_on:
      - navaia-forge-api
    restart: unless-stopped
    networks:
      - navaia-forge

  postgres:
    image: postgres:16-alpine
    container_name: navaia-forge-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-navaia_forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-navaia_forge}
      POSTGRES_DB: ${POSTGRES_DB:-navaia_forge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-navaia_forge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - navaia-forge

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.6
    container_name: navaia-forge-weaviate
    expose:
      - "8080"
      - "50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      RAFT_JOIN: node1
      RAFT_BOOTSTRAP_EXPECT: 1
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - navaia-forge

  redis:
    image: redis:7-alpine
    container_name: navaia-forge-redis
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - navaia-forge

volumes:
  pgdata:
  weaviate_data:
  redis_data:

networks:
  navaia-forge:
    driver: bridge
